---
- name: Install OpenClaw CLI
  community.general.npm:
    name: openclaw
    global: true
    state: latest

- name: Install ClawHub CLI
  community.general.npm:
    name: clawhub
    global: true
    state: latest

- name: Read current OpenClaw config
  ansible.builtin.shell: |
    echo "tools.profile=$(openclaw config get tools.profile 2>/dev/null)"
    echo "tools.sessions.visibility=$(openclaw config get tools.sessions.visibility 2>/dev/null)"
    echo "tools.exec.ask=$(openclaw config get tools.exec.ask 2>/dev/null)"
    echo "tools.exec.security=$(openclaw config get tools.exec.security 2>/dev/null)"
    echo "tools.exec.host=$(openclaw config get tools.exec.host 2>/dev/null)"
    echo "tools.exec.timeoutSec=$(openclaw config get tools.exec.timeoutSec 2>/dev/null)"
    echo "approvals.exec.enabled=$(openclaw config get approvals.exec.enabled 2>/dev/null)"
    echo "approvals.plugin.enabled=$(openclaw config get approvals.plugin.enabled 2>/dev/null)"
  register: openclaw_config
  changed_when: false

- name: Configure OpenClaw settings
  ansible.builtin.command: openclaw config set {{ item.key }} {{ item.value }}
  loop:
    - { key: tools.profile, value: "full" }
    - { key: tools.sessions.visibility, value: "all" }
    - { key: tools.exec.ask, value: "off" }
    - { key: tools.exec.security, value: "full" }
    - { key: tools.exec.host, value: "gateway" }
    - { key: tools.exec.timeoutSec, value: "1200" }
    - { key: approvals.exec.enabled, value: "false" }
    - { key: approvals.plugin.enabled, value: "false" }
  when: "item.key + '=' + item.value not in openclaw_config.stdout"
  changed_when: true

- name: Check installed OpenClaw skills
  ansible.builtin.shell:
    cmd: set -o pipefail && openclaw skills list --json 2>&1 | sed -n '/^{/,$p'
  register: openclaw_skills
  changed_when: false

- name: Parse OpenClaw skills list
  ansible.builtin.set_fact:
    openclaw_skills_parsed: "{{ (openclaw_skills.stdout | from_json).skills | map(attribute='name') | list }}"
  when: openclaw_skills.stdout | default('') is match('^\\s*\\{')

- name: Fail if OpenClaw skills list was not parseable
  ansible.builtin.fail:
    msg: "openclaw skills list --json returned unparseable output: {{ openclaw_skills.stdout | default('(empty)') }}"
  when: openclaw_skills_parsed is not defined

- name: Install OpenClaw skills
  ansible.builtin.command: openclaw skills install {{ item }}
  loop:
    - obsidian
    - tavily
  when: item not in openclaw_skills_parsed
  changed_when: true

- name: Check enabled OpenClaw plugins
  ansible.builtin.shell:
    cmd: set -o pipefail && openclaw plugins list --enabled --json 2>&1 | sed -n '/^{/,$p'
  register: openclaw_plugins_enabled
  changed_when: false

- name: Parse OpenClaw enabled plugins list
  ansible.builtin.set_fact:
    openclaw_plugins_enabled_parsed: "{{ (openclaw_plugins_enabled.stdout | from_json).plugins | map(attribute='id') | list }}"
  when: openclaw_plugins_enabled.stdout | default('') is match('^\\s*\\{')

- name: Fail if OpenClaw plugins list was not parseable
  ansible.builtin.fail:
    msg: "openclaw plugins list --enabled --json returned unparseable output: {{ openclaw_plugins_enabled.stdout | default('(empty)') }}"
  when: openclaw_plugins_enabled_parsed is not defined

- name: Enable OpenClaw plugins
  ansible.builtin.command: openclaw plugins enable {{ item }}
  loop:
    - telegram
  when: item not in openclaw_plugins_enabled_parsed
  changed_when: true
