---
- name: Install OpenClaw CLI
  community.general.npm:
    name: openclaw
    global: true
    state: latest

- name: Install ClawHub CLI
  community.general.npm:
    name: clawhub
    global: true
    state: latest

- name: Read current OpenClaw config
  ansible.builtin.shell: |
    echo "tools.profile=$(openclaw config get tools.profile 2>/dev/null)"
    echo "tools.sessions.visibility=$(openclaw config get tools.sessions.visibility 2>/dev/null)"
    echo "tools.exec.ask=$(openclaw config get tools.exec.ask 2>/dev/null)"
    echo "tools.exec.security=$(openclaw config get tools.exec.security 2>/dev/null)"
    echo "tools.exec.host=$(openclaw config get tools.exec.host 2>/dev/null)"
    echo "tools.exec.timeoutSec=$(openclaw config get tools.exec.timeoutSec 2>/dev/null)"
    echo "approvals.exec.enabled=$(openclaw config get approvals.exec.enabled 2>/dev/null)"
    echo "approvals.plugin.enabled=$(openclaw config get approvals.plugin.enabled 2>/dev/null)"
  register: oc_config
  changed_when: false

- name: Configure OpenClaw settings
  ansible.builtin.command: openclaw config set {{ item.key }} {{ item.value }}
  loop:
    - { key: tools.profile, value: "full" }
    - { key: tools.sessions.visibility, value: "all" }
    - { key: tools.exec.ask, value: "off" }
    - { key: tools.exec.security, value: "full" }
    - { key: tools.exec.host, value: "gateway" }
    - { key: tools.exec.timeoutSec, value: "1200" }
    - { key: approvals.exec.enabled, value: "false" }
    - { key: approvals.plugin.enabled, value: "false" }
  when: "item.key + '=' + item.value not in oc_config.stdout"

- name: Check installed OpenClaw skills
  ansible.builtin.shell: openclaw skills list --json 2>&1
  register: oc_skills
  changed_when: false

- name: Parse OpenClaw skills list
  ansible.builtin.set_fact:
    oc_skills_parsed: "{{ (oc_skills.stdout | from_json).skills | map(attribute='name') | list }}"
  when: oc_skills.stdout | default('') is match('^\\s*\\{')
  changed_when: false

- name: Install OpenClaw skills
  ansible.builtin.command: openclaw skills install {{ item }}
  loop:
    - obsidian
    - tavily
  when: >
    oc_skills_parsed is defined and
    item not in oc_skills_parsed

- name: Check enabled OpenClaw plugins
  ansible.builtin.shell: openclaw plugins list --enabled --json 2>&1
  register: oc_plugins_enabled
  changed_when: false

- name: Parse OpenClaw enabled plugins list
  ansible.builtin.set_fact:
    oc_plugins_enabled_parsed: "{{ (oc_plugins_enabled.stdout | from_json).plugins | map(attribute='id') | list }}"
  when: oc_plugins_enabled.stdout | default('') is match('^\\s*\\{')
  changed_when: false

- name: Enable OpenClaw plugins
  ansible.builtin.command: openclaw plugins enable {{ item }}
  loop:
    - telegram
  when: >
    oc_plugins_enabled_parsed is defined and
    item not in oc_plugins_enabled_parsed
