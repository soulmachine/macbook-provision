---
# Headroom — a local context-compression proxy that sits between AI coding
# agents and the LLM provider, cutting the tokens sent upstream by 60–95%.
# https://github.com/chopratejas/headroom
#
# pip --user puts the `headroom` script in ~/.local/bin, which bootstrap.sh and
# the oh-my-zsh role keep on PATH. The `[all]` extra pulls in the memory +
# code-graph dependencies, so the `--memory`/`--code-graph` flags work when you
# later run `headroom wrap claude --memory --code-graph` yourself.
- name: Install Headroom CLI (headroom-ai with all extras)
  ansible.builtin.pip:
    name: "headroom-ai[all]"
    executable: pip3
    extra_args: --user

# `headroom wrap openclaw` is safe to run here. Unlike `wrap claude`/`wrap codex`
# — which start the proxy and then launch the agent's interactive TUI in the
# foreground (wrap.py: `subprocess.run([claude_bin, ...])`), blocking the
# playbook forever — for OpenClaw `wrap` instead installs + configures the
# Headroom plugin, sets the `plugins.slots.contextEngine` slot, restarts the
# gateway, and RETURNS. It needs the `openclaw` CLI, so this role depends on the
# `openclaw` role (see meta/main.yml). Gated on the contextEngine slot so the plugin
# is installed (and the gateway bounced) only on the first run.
- name: Check whether OpenClaw already uses Headroom as its context engine
  ansible.builtin.command: openclaw config get plugins.slots.contextEngine
  register: headroom_openclaw_ctx
  changed_when: false
  failed_when: false
  check_mode: false

- name: Wrap OpenClaw with Headroom (install plugin + set contextEngine slot)
  ansible.builtin.command: headroom wrap openclaw
  when: "'headroom' not in (headroom_openclaw_ctx.stdout | default(''))"
  changed_when: true
