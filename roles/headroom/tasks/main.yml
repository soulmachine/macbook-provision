---
# Headroom — a local context-compression proxy that sits between AI coding
# agents and the LLM provider, cutting the tokens sent upstream by 60–95%.
# https://github.com/chopratejas/headroom
#
# Apple Silicon ONLY: headroom-ai ships only arm64 macOS (cp310-abi3) wheels. On
# Intel macOS there's no binary wheel, so uv falls back to a source build
# (maturin/pyo3 — and the memory extras' torch has no x86_64 macOS wheel either)
# which fails. So the whole role no-ops on x86_64 (e.g. the Intel mac-mini-2018).
#
# Installed with `uv tool` (NOT pip/pipx): headroom-ai pulls litellm, which caps
# at Requires-Python <3.14 while mise Python is 3.14; `uv tool install`
# auto-selects a compatible managed Python (3.12). The `headroom` shim lands in
# ~/.local/bin (on PATH via bootstrap.sh + oh-my-zsh). `[all]` pulls in the
# memory + code-graph deps for `headroom wrap claude --memory --code-graph`.
- name: Provision Headroom (Apple Silicon only)
  when: ansible_facts['architecture'] == 'arm64'
  block:
    - name: Check whether Headroom is already installed via uv
      ansible.builtin.command: uv tool list
      register: headroom_uv_tools
      changed_when: false
      check_mode: false

    - name: Install Headroom CLI (headroom-ai[all]) via uv tool
      ansible.builtin.command: uv tool install "headroom-ai[all]"
      when: "'headroom-ai' not in headroom_uv_tools.stdout"
      changed_when: true

    # `headroom wrap <agent>` launches the agent's interactive TUI in the
    # foreground, so it can't be a playbook task (it would block the play).
    # Expose the wraps as aliases instead. (`wrap openclaw` is omitted —
    # incompatible with the current openclaw CLI as of headroom 0.26.0.)
    - name: Add Headroom wrap aliases to .zshrc
      ansible.builtin.lineinfile:
        path: "{{ lookup('env', 'HOME') }}/.zshrc"
        line: "{{ item.line }}"
        regexp: "{{ item.regexp }}"
        state: present
      loop:
        - { regexp: '^alias cch=', line: 'alias cch="headroom wrap claude --memory --code-graph"' }
        - { regexp: '^alias cxh=', line: 'alias cxh="headroom wrap codex"' }
