---
- name: Install smux # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell: curl -fsSL https://shawnpana.com/smux/install.sh | bash
  args:
    creates: "{{ lookup('env', 'HOME') }}/.smux/bin/smux"

- name: Update smux to the latest version # noqa: command-instead-of-module
  ansible.builtin.shell: |
    set -euo pipefail
    files=("$HOME/.smux/tmux.conf" "$HOME/.smux/bin/tmux-bridge" "$HOME/.smux/bin/smux")
    before="$(shasum -a 256 "${files[@]}" 2>/dev/null || true)"
    "$HOME/.smux/bin/smux" update 1>&2
    after="$(shasum -a 256 "${files[@]}" 2>/dev/null || true)"
    if [ "$before" = "$after" ]; then echo unchanged; else echo changed; fi
  register: smux_update
  changed_when: smux_update.stdout == "changed"

- name: Install smux skill for all agents
  ansible.builtin.command:
    cmd: npx skills add ShawnPana/smux --all -g -y
    creates: "{{ lookup('env', 'HOME') }}/.agents/skills/smux"
