---
- name: Install gh (GitHub CLI)
  community.general.homebrew:
    name: gh
    state: latest

- name: Install gh-cli skill for each agent
  ansible.builtin.command: gh skill install github/awesome-copilot gh-cli --agent {{ item }} --scope user
  loop:
    - claude-code
    - codex
    - gemini-cli
    - openclaw
  register: gh_skill_install
  changed_when: gh_skill_install.rc == 0
  failed_when:
    - gh_skill_install.rc != 0
    - "'already installed' not in (gh_skill_install.stdout + gh_skill_install.stderr)"
