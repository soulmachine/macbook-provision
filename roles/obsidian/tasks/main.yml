---
- name: Install Obsidian
  community.general.homebrew_cask:
    name: obsidian
    state: present

- name: Install Defuddle CLI # noqa: command-instead-of-module
  ansible.builtin.command: npm install -g defuddle
  register: obsidian_defuddle_install
  changed_when: "'added' in obsidian_defuddle_install.stdout"

- name: Install Obsidian skills for all agents
  ansible.builtin.command:
    cmd: npx skills add https://github.com/kepano/obsidian-skills --all -g -y
    creates: "{{ lookup('env', 'HOME') }}/.agents/skills/obsidian-cli"
