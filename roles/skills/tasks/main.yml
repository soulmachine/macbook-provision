---
- name: Install baoyu skills for all agents
  ansible.builtin.command:
    cmd: npx skills add jimliu/baoyu-skills -g -y --all
    creates: "{{ lookup('env', 'HOME') }}/.agents/skills/baoyu-youtube-transcript"

- name: Install mattpocock skills for all agents
  ansible.builtin.command:
    cmd: npx skills add https://github.com/mattpocock/skills -all -g -y
    creates: "{{ lookup('env', 'HOME') }}/.agents/skills/diagnose"

- name: Install soulmachine skills for all agents
  ansible.builtin.command:
    cmd: npx skills add soulmachine/skills -g -y --all
    creates: "{{ lookup('env', 'HOME') }}/.agents/skills/mac-mini-as-headless-server"

- name: Install last30days skill for all agents
  ansible.builtin.command:
    cmd: npx skills add mvanhorn/last30days-skill -g -y --all
    creates: "{{ lookup('env', 'HOME') }}/.agents/skills/last30days"
