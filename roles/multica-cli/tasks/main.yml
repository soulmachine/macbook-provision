---
- name: Tap multica-ai/tap
  community.general.homebrew_tap:
    name: multica-ai/tap
    state: present

# Homebrew refuses to load formulae from untrusted third-party taps
# (HOMEBREW_REQUIRE_TAP_TRUST), so the install below fails on a fresh host with
# "Refusing to load formula ... from untrusted tap" unless the tap is trusted
# first. `brew trust --tap` is idempotent (rc=0 whether or not already trusted);
# keying changed_when off its output reports changed only on the run that adds it.
- name: Trust multica-ai/tap
  ansible.builtin.command:
    cmd: brew trust --tap multica-ai/tap
  register: _multica_trust
  changed_when: "'Already trusted tap' not in _multica_trust.stdout"

- name: Install multica CLI
  community.general.homebrew:
    name: multica-ai/tap/multica
    state: latest

- name: Ensure ~/.agents/skills directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.agents/skills"
    state: directory
    mode: "0755"

- name: Install multica-cli skill to ~/.agents/skills
  ansible.builtin.copy:
    src: multica-cli/
    dest: "{{ lookup('env', 'HOME') }}/.agents/skills/multica-cli/"
    mode: "0644"
    directory_mode: "0755"

- name: Ensure ~/.claude/skills directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.claude/skills"
    state: directory
    mode: "0755"

- name: Check existing ~/.claude/skills/multica-cli
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.claude/skills/multica-cli"
    follow: false
  register: multica_cli_claude_skill

- name: Remove existing ~/.claude/skills/multica-cli if it is a real directory
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.claude/skills/multica-cli"
    state: absent
  when:
    - multica_cli_claude_skill.stat.exists
    - not multica_cli_claude_skill.stat.islnk

- name: Symlink ~/.claude/skills/multica-cli to ~/.agents/skills/multica-cli
  ansible.builtin.file:
    src: "{{ lookup('env', 'HOME') }}/.agents/skills/multica-cli"
    dest: "{{ lookup('env', 'HOME') }}/.claude/skills/multica-cli"
    state: link
