---
- name: Tap multica-ai/tap
  community.general.homebrew_tap:
    name: multica-ai/tap
    state: present

- name: Install multica CLI
  community.general.homebrew:
    name: multica-ai/tap/multica
    state: latest

- name: Ensure ~/.agents/skills directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.agents/skills"
    state: directory
    mode: "0755"

- name: Install multica-cli skill to ~/.agents/skills
  ansible.builtin.copy:
    src: multica-cli/
    dest: "{{ lookup('env', 'HOME') }}/.agents/skills/multica-cli/"
    mode: "0644"
    directory_mode: "0755"

- name: Ensure ~/.claude/skills directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.claude/skills"
    state: directory
    mode: "0755"

- name: Check existing ~/.claude/skills/multica-cli
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.claude/skills/multica-cli"
    follow: false
  register: multica_cli_claude_skill

- name: Remove existing ~/.claude/skills/multica-cli if it is a real directory
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.claude/skills/multica-cli"
    state: absent
  when:
    - multica_cli_claude_skill.stat.exists
    - not multica_cli_claude_skill.stat.islnk

- name: Symlink ~/.claude/skills/multica-cli to ~/.agents/skills/multica-cli
  ansible.builtin.file:
    src: "{{ lookup('env', 'HOME') }}/.agents/skills/multica-cli"
    dest: "{{ lookup('env', 'HOME') }}/.claude/skills/multica-cli"
    state: link
