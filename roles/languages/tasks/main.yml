---
- name: Install Go via mise
  ansible.builtin.command: mise use --global go@latest
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  register: mise_go
  changed_when: "'installed' in mise_go.stderr"

- name: Install Node.js via mise
  ansible.builtin.command: mise use --global node@lts
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  register: mise_node
  changed_when: "'installed' in mise_node.stderr"

- name: Install JDK via mise
  ansible.builtin.command: mise use --global java@lts
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  register: mise_java
  changed_when: "'installed' in mise_java.stderr"
