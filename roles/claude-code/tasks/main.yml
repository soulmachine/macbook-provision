---
- name: Install Claude Code # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: "{{ lookup('env', 'HOME') }}/.local/bin/claude"

- name: Update Claude Code to the latest version
  ansible.builtin.command: claude update
  register: claude_code_self_update
  changed_when: "'Claude Code is up to date' not in claude_code_self_update.stdout"

- name: Add ccd alias to .zshrc
  ansible.builtin.lineinfile:
    path: "{{ lookup('env', 'HOME') }}/.zshrc"
    line: 'alias ccd="claude --dangerously-skip-permissions --effort max"'
    regexp: '^alias ccd='
    state: present

- name: Check installed plugins
  ansible.builtin.slurp:
    src: "{{ lookup('env', 'HOME') }}/.claude/plugins/installed_plugins.json"
  register: claude_code_plugins_raw
  failed_when: false

- name: Decode installed plugins
  ansible.builtin.set_fact:
    claude_code_plugins_content: "{{ (claude_code_plugins_raw.content | default('') | b64decode) if claude_code_plugins_raw is succeeded else '' }}"

# Read claude code settings
- name: Ensure ~/.claude directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.claude"
    state: directory
    mode: "0755"

- name: Read existing Claude Code settings
  ansible.builtin.slurp:
    src: "{{ lookup('env', 'HOME') }}/.claude/settings.json"
  register: claude_code_settings_raw
  failed_when: false

- name: Parse existing Claude Code settings
  ansible.builtin.set_fact:
    claude_code_settings: "{{ (claude_code_settings_raw.content | b64decode | from_json) if claude_code_settings_raw is succeeded else {} }}"

- name: Add plugin marketplaces
  ansible.builtin.command: claude plugin marketplace add {{ item }}
  loop:
    - anthropics/claude-plugins-official # https://claude.com/plugins
    - OthmanAdi/planning-with-files
    - thedotmack/claude-mem
    - forrestchang/andrej-karpathy-skills
    - swe-workflow/swe-workflow
  register: claude_code_mp
  changed_when: "'already' not in claude_code_mp.stdout"

- name: Install plugins
  ansible.builtin.command: claude plugin install {{ item }}
  loop:
    - frontend-design@claude-plugins-official
    - feature-dev@claude-plugins-official
    - planning-with-files@planning-with-files
    - claude-mem@thedotmack
    - andrej-karpathy-skills@karpathy-skills
    - swe-workflow@swe-workflow
  when: "item not in claude_code_plugins_content"
  changed_when: true

- name: Update plugins to the latest version
  ansible.builtin.command: claude plugin update {{ item }}
  loop:
    - frontend-design@claude-plugins-official
    - feature-dev@claude-plugins-official
    - planning-with-files@planning-with-files
    - claude-mem@thedotmack
    - andrej-karpathy-skills@karpathy-skills
    - swe-workflow@swe-workflow
  register: claude_code_update
  changed_when: "'already' not in claude_code_update.stdout"

- name: Check if Claude Code Bridge is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.local/bin/ccb"
    follow: true
  register: ccb_installed

- name: Check Claude Code Bridge for updates
  ansible.builtin.command: ccb version
  register: ccb_version
  changed_when: false
  failed_when: false
  when: ccb_installed.stat.exists

# Clone + re-run install.sh is one uniform path for a fresh install, the
# v5 -> v7 major jump, and ongoing updates alike — `ccb update` can't cover all
# three (it needs ccb already present, and v5's updater is broken: its git path
# wants a .git the install never has since install.sh rsyncs --exclude .git, and
# its tarball path hardcoded the pre-rename "claude_code_bridge-main" vs the
# renamed repo's "claude_codex_bridge-main"). Cloning to a dest we name avoids
# all that. CCB_CONFIRM_MAJOR_UPGRADE=1 auto-accepts breaking major bumps that
# install.sh otherwise refuses non-interactively. Idempotent: gated on a missing
# install or `ccb version` reporting an update (matched case-insensitively — v5
# prints "Update available", v7 release installs print "Release update
# available"); after installing, `ccb version` reports "Up to date" and the
# block is skipped.
- name: Install or update Claude Code Bridge
  when: >-
    not ccb_installed.stat.exists
    or 'update available' in (ccb_version.stdout | default('') | lower)
  block:
    - name: Clone Claude Code Bridge repository # noqa: latest[git]
      ansible.builtin.git:
        repo: https://github.com/bfly123/claude_code_bridge.git
        dest: /tmp/claude_code_bridge
        version: HEAD
        force: true
    - name: Run Claude Code Bridge installer
      ansible.builtin.command: ./install.sh install
      args:
        chdir: /tmp/claude_code_bridge
      environment:
        CCB_SOURCE_KIND: release
        CCB_CONFIRM_MAJOR_UPGRADE: "1"
      changed_when: true
  always:
    - name: Remove cloned Claude Code Bridge directory
      ansible.builtin.file:
        path: /tmp/claude_code_bridge
        state: absent

- name: Disable Co-Authored-By in commits
  ansible.builtin.copy:
    dest: "{{ lookup('env', 'HOME') }}/.claude/settings.json"
    content: "{{ claude_code_settings | combine({'attribution': {'commit': ''}}) | to_nice_json }}\n"
    mode: "0644"
  when: (claude_code_settings.attribution.commit | default(none)) != ''

- name: Re-read Claude Code settings
  ansible.builtin.slurp:
    src: "{{ lookup('env', 'HOME') }}/.claude/settings.json"
  register: claude_code_settings_raw
  failed_when: false

- name: Re-parse Claude Code settings
  ansible.builtin.set_fact:
    claude_code_settings: "{{ (claude_code_settings_raw.content | b64decode | from_json) if claude_code_settings_raw is succeeded else {} }}"

- name: Enable Remote Control for all sessions
  ansible.builtin.copy:
    dest: "{{ lookup('env', 'HOME') }}/.claude/settings.json"
    content: "{{ claude_code_settings | combine({'remoteControlAtStartup': true}) | to_nice_json }}\n"
    mode: "0644"
  when: (claude_code_settings.remoteControlAtStartup | default(false)) != true

# `claude plugin install` adds a plugin to ~/.claude/plugins/installed_plugins.json
# but does NOT add it to `enabledPlugins` in ~/.claude/settings.json, and only
# enabled plugins appear in `/plugin`. So we explicitly enable each one. Gate on
# key absence (not value), so a user's manual `/plugin` disable is respected on
# re-runs. Runs last so the earlier shallow-merge writes can't clobber the
# enabledPlugins map.
- name: Enable plugins
  ansible.builtin.command: claude plugin enable {{ item }}
  loop:
    - frontend-design@claude-plugins-official
    - feature-dev@claude-plugins-official
    - planning-with-files@planning-with-files
    - claude-mem@thedotmack
    - andrej-karpathy-skills@karpathy-skills
    - swe-workflow@swe-workflow
  when: "item not in (claude_code_settings.enabledPlugins | default({}))"
  changed_when: true
