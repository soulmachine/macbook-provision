---
# Installs a native prebuilt binary to $HOME/.kimi-code/bin/kimi (the command is
# named `kimi`) and appends its PATH line to .zshrc itself (grep-guarded, so the
# script stays idempotent on its own). The `creates:` guard skips the whole
# curl | bash on re-runs once the binary is present.
- name: Install kimi-code # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell: curl -fsSL https://code.kimi.com/kimi-code/install.sh | bash
  args:
    creates: "{{ lookup('env', 'HOME') }}/.kimi-code/bin/kimi"

- name: Add kimi-yolo alias to .zshrc
  ansible.builtin.lineinfile:
    path: "{{ lookup('env', 'HOME') }}/.zshrc"
    line: 'alias kimi-yolo="kimi --yolo"'
    regexp: '^alias kimi-yolo='
    state: present
