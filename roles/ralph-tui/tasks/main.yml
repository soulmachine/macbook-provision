---
- name: Install ralph-tui
  ansible.builtin.command: bun install -g ralph-tui
  environment:
    PATH: "{{ ansible_facts['user_dir'] }}/.bun/bin:{{ ansible_env.PATH }}"
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.bun/bin/ralph-tui"

- name: Check installed ralph-tui skills
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.agents/skills/{{ item }}"
  loop: &ralph_tui_skills
    - ralph-tui-prd
    - ralph-tui-create-json
    - ralph-tui-create-beads
    - ralph-tui-create-beads-rust
  register: ralph_tui_skills_stat

- name: Install ralph-tui skills
  ansible.builtin.command: bunx skills add subsy/ralph-tui --all -g
  environment:
    PATH: "{{ ansible_facts['user_dir'] }}/.bun/bin:{{ ansible_env.PATH }}"
  when: ralph_tui_skills_stat.results | selectattr('stat.exists', 'false') | list | length > 0
  changed_when: true

- name: Ensure agent skills directories exist
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.{{ item }}/skills"
    state: directory
    mode: "0755"
  loop: &agent_dirs
    - codex
    - gemini

- name: Symlink ralph-tui skills into agent directories
  ansible.builtin.file:
    src: ../../.agents/skills/{{ item.1 }}
    dest: "{{ ansible_facts['user_dir'] }}/.{{ item.0 }}/skills/{{ item.1 }}"
    state: link
  loop: "{{ _agent_dirs | product(_skills) | list }}"
  vars:
    _agent_dirs: *agent_dirs
    _skills: *ralph_tui_skills
