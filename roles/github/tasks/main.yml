---
- name: Install gh CLI
  community.general.homebrew:
    name: gh
    state: latest

- name: Load GH_TOKEN from environment
  ansible.builtin.set_fact:
    github_token: "{{ lookup('env', 'GH_TOKEN') }}"
  no_log: true

- name: Configure GitHub (SSH keys, git signing config)
  when: github_token | length > 0
  block:
    - name: Copy GitHub setup script
      ansible.builtin.copy:
        src: setup_github.sh
        dest: /tmp/setup_github.sh
        mode: "0755"
      changed_when: false

    - name: Run GitHub setup script
      ansible.builtin.command: /tmp/setup_github.sh
      environment:
        GH_TOKEN: "{{ github_token }}"
        GITHUB_SSH_KEY: "{{ lookup('env', 'GITHUB_SSH_KEY') }}"
      register: _github_setup
      changed_when: "'CHANGED' in _github_setup.stdout"
      no_log: true
  rescue:
    - name: Warn that GitHub setup failed (non-fatal — play continues)
      ansible.builtin.debug:
        msg:
          - "GitHub setup script failed — continuing anyway (non-fatal)."
          - "Most likely GH_TOKEN is expired/invalid or missing scopes (admin:ssh_signing_key, admin:public_key, user:email, read:user)."
          - "SSH auth + signing keys are already on GitHub, so git-over-SSH and SSH commit signing keep working without the PAT."
          - "Diagnose: 'source .env && gh api -i /user' and look for HTTP 401 / x-oauth-scopes."
          - "Fix: regenerate the PAT, update GH_TOKEN in .env, then re-run. (Or run with GH_TOKEN unset to skip this role.)"

- name: Skip GitHub setup (GH_TOKEN not set)
  ansible.builtin.debug:
    msg: "GH_TOKEN not set — skipping GitHub SSH key and git config setup."
  when: github_token | length == 0
