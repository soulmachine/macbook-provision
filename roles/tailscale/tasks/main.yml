---
# Why CLI tailscaled instead of the GUI (App Store) Tailscale:
#   - The App Store build is sandboxed and cannot enable Tailscale SSH.
#     The standalone tailscaled supports it, giving identity-based auth.
#   - tailscaled can run at system boot before any user has logged in
#     (e.g. VNC into the machine after a power outage).
#   - Uses the /dev/utun TUN interface instead of Apple's Network Extension API.
#   - Fully open source (the GUI client is not open source on macOS).
#   - Trade-offs: tailscaled on macOS is less tested. MagicDNS doesn't
#     auto-configure either — this role writes /etc/resolver/ts.net below.
# We remove the GUI cask first, then install the CLI + tailscaled via Homebrew.
# Reference: https://github.com/tailscale/tailscale/wiki/Tailscaled-on-macOS
#
# Sudo handling for the cask uninstall:
#   `brew uninstall --cask tailscale-app` invokes `sudo` internally to remove the
#   root-owned files installed by the .pkg payload. That inner `sudo` call has no
#   `-A` flag, so `SUDO_ASKPASS` alone is NOT enough — sudo only auto-runs the
#   askpass helper when invoked with `-A` or with askpass set in /etc/sudo.conf.
#   We prime sudo's timestamp here via our own `sudo -A -v`; brew's subsequent
#   sudo calls then reuse the cached credential within sudo's default ~5 min
#   timeout. We don't set `become: true` because Homebrew refuses to run as root.
#
# Login-item warning:
#   The cask's uninstall recipe contains `login_item: Tailscale`, which brew
#   removes via AppleScript `tell application "System Events"`. The terminal
#   running ansible-playbook needs Automation → System Events permission (System
#   Settings → Privacy & Security → Automation). Without it the AppleEvent times
#   out with a non-fatal warning; the cask itself is still removed.
- name: Check if Tailscale GUI cask is installed
  ansible.builtin.command:
    cmd: brew list --cask tailscale-app
  register: _tailscale_cask_check
  failed_when: false
  changed_when: false

- name: Prime sudo timestamp via askpass helper (brew's inner sudo has no -A)
  ansible.builtin.command:
    cmd: sudo -A -v
  changed_when: false
  when: _tailscale_cask_check.rc == 0

- name: Ensure Tailscale GUI cask is absent
  community.general.homebrew_cask:
    name: tailscale-app
    state: absent

# The standalone GUI app installs a CLI shim at /usr/local/bin/tailscale
# (`#!/bin/sh` → /Applications/Tailscale.app/...). The cask uninstall above
# removes the .app but orphans this shim. On Apple Silicon /usr/local/bin
# precedes /opt/homebrew/bin on PATH, so the dead shim shadows the Homebrew
# CLI and every `tailscale` call fails with "No such file or directory".
# Homebrew's own CLI is always a symlink (into Cellar) — the GUI shim is a
# regular file — so `not islnk` safely targets only the stale shim.
- name: Detect leftover standalone Tailscale CLI shim
  ansible.builtin.stat:
    path: /usr/local/bin/tailscale
  register: _tailscale_usr_local_cli

- name: Remove stale standalone Tailscale CLI shim (shadows Homebrew CLI on PATH)
  ansible.builtin.file:
    path: /usr/local/bin/tailscale
    state: absent
  become: true
  when:
    - _tailscale_usr_local_cli.stat.exists
    - not _tailscale_usr_local_cli.stat.islnk

- name: Install tailscale CLI and tailscaled daemon
  community.general.homebrew:
    name: tailscale
    state: latest

# Registers tailscaled as a system LaunchDaemon at /Library/LaunchDaemons/, so it
# starts at boot before any user logs in. Required for the `tailscale up` task
# below to find a running daemon to talk to.
- name: Install tailscaled as a system LaunchDaemon
  ansible.builtin.command: tailscaled install-system-daemon
  become: true
  args:
    creates: /Library/LaunchDaemons/com.tailscale.tailscaled.plist

# Full Disk Access (FDA) for tailscaled:
#   When `tailscale ssh` connects to this Mac, tailscaled spawns the login
#   shell. That shell inherits tailscaled's TCC sandbox — NOT the interactive
#   user's. So without FDA on /usr/local/bin/tailscaled, commands like
#   `cd ~/Desktop` or `cd ~/Documents` fail with "Operation not permitted"
#   inside SSH sessions.
#
#   macOS TCC is designed to resist scripted grants: `tccutil` only RESETs
#   permissions, the system TCC.db is SIP-protected, and unsigned PPPC
#   profiles still need manual approval. On an unmanaged (non-MDM) Mac there
#   is no full-automation path — we open the FDA pane and pause for the user.
#
#   A marker under ~/.local/state suppresses the prompt on later runs; delete
#   it if you ever revoke FDA and need to be re-prompted.
- name: Check FDA acknowledgment marker for tailscaled
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.local/state/macbook-provision/tailscaled-fda-acknowledged"
  register: _tailscaled_fda_marker

- name: Grant Full Disk Access to tailscaled
  when: not _tailscaled_fda_marker.stat.exists
  block:
    - name: Open System Settings → Privacy & Security → Full Disk Access
      ansible.builtin.command:
        cmd: open "x-apple.systempreferences:com.apple.preference.security?Privacy_AllFiles"
      changed_when: false

    - name: Wait for user to grant FDA to /usr/local/bin/tailscaled
      ansible.builtin.pause:
        prompt: |

          ================================================================
          Manual step: grant Full Disk Access to tailscaled
          ================================================================

          Tailscale SSH spawns shells as children of tailscaled, so they
          inherit its TCC sandbox. Without FDA, `cd ~/Desktop` and
          `cd ~/Documents` fail inside SSH sessions.

          The Full Disk Access pane is now open. Steps:
            1. Click the "+" button (unlock with Touch ID if asked)
            2. Press Cmd+Shift+G and paste:
                 /usr/local/bin/tailscaled
            3. Press Return, then click "Open"
            4. Ensure the toggle next to tailscaled is ON

          Press Enter once done. (If you skip this, delete
          ~/.local/state/macbook-provision/tailscaled-fda-acknowledged
          to be prompted again next run.)

    - name: Ensure state directory for FDA marker exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.local/state/macbook-provision"
        state: directory
        mode: '0755'

    - name: Record FDA acknowledgment to skip prompt on future runs
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.local/state/macbook-provision/tailscaled-fda-acknowledged"
        state: touch
        mode: '0644'

    # TCC is checked at process start, so tailscaled (already launched by
    # install-system-daemon above) must be restarted to see the new grant.
    - name: Restart tailscaled so the new FDA grant takes effect
      ansible.builtin.command:
        cmd: launchctl kickstart -k system/com.tailscale.tailscaled
      become: true
      changed_when: true

# tailscaled on macOS only writes /etc/resolver/search.tailscale with a search
# domain, no `nameserver` line. Without a per-domain resolver pointing at
# 100.100.100.100, *.ts.net lookups bypass tailscaled, fall through to the
# upstream resolver, and fail (NXDOMAIN). Adding /etc/resolver/ts.net tells
# macOS to route those queries to tailscaled's MagicDNS resolver.
# Reference: https://github.com/tailscale/tailscale/wiki/Tailscaled-on-macOS
- name: Ensure /etc/resolver directory exists
  ansible.builtin.file:
    path: /etc/resolver
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  become: true

- name: Route *.ts.net DNS queries to tailscaled MagicDNS
  ansible.builtin.copy:
    dest: /etc/resolver/ts.net
    content: "nameserver 100.100.100.100\n"
    owner: root
    group: wheel
    mode: '0644'
  become: true
  notify: Flush DNS cache

# Auto-connect to the tailnet when `TAILSCALE_AUTH_KEY` is set in the environment.
# Copy `.env.example` to `.env`, fill in the real key, then `direnv allow` so the
# variable is exported into the shell running `ansible-playbook`.
- name: Load Tailscale auth key from environment
  ansible.builtin.set_fact:
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"

- name: Auto-connect to tailnet when auth key is provided
  when: tailscale_auth_key | length > 0
  block:
    - name: Check current tailscale state
      ansible.builtin.command: tailscale status --json
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: Bring tailscale up with auth key
      ansible.builtin.command: >
        tailscale up
        --auth-key={{ tailscale_auth_key }}
        --accept-dns
        --ssh
        --operator={{ lookup('env', 'USER') }}
      become: true
      no_log: true
      when: >
        tailscale_status.rc != 0
        or (tailscale_status.stdout | from_json).BackendState != 'Running'
