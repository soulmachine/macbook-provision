---
# Why the standalone Tailscale.app cask (not the App Store build, not the
# open-source CLI tailscaled):
#   - The `tailscale-app` cask ships the official build from tailscale.com.
#   - Uses Apple's Network Extension API; the embedded daemon auto-handles
#     MagicDNS, so no /etc/resolver/ts.net file is required.
#   - Officially supported by Tailscale and auto-updated through the GUI.
#
# On a fresh Mac the user must launch Tailscale.app once, click "Allow"
# on the "would like to add VPN configurations" dialog, and toggle the
# Network Extension on in System Settings → General → Login Items &
# Extensions → Network Extensions. The role auto-detects the extension
# state via `systemextensionsctl list` and only pauses if it's not yet
# `[activated enabled]`.

# brew's .pkg-based cask install shells out to `sudo` internally (no `-A`) to
# expand root-owned payload; passwordless sudo (configured by bootstrap.sh) lets
# that succeed unattended, so no timestamp priming is needed.
- name: Install Tailscale.app (standalone cask, NOT App Store)
  community.general.homebrew_cask:
    name: tailscale-app
    state: latest

# Verify the Tailscale Network Extension is enabled before attempting
# `tailscale up`. On macOS Sonoma+ the user must toggle the extension on in
# System Settings → General → Login Items & Extensions → Network Extensions;
# until they do, the embedded daemon can't run the packet-tunnel provider
# and `tailscale up` fails. `systemextensionsctl list` shows
# `[activated enabled]` when the extension is on, or a different state
# (`activated waiting for user`, `terminated waiting for user`, etc.) — or
# omits the row entirely if Tailscale.app has never been launched.
- name: Check whether Tailscale Network Extension is enabled
  ansible.builtin.shell: |
    set -o pipefail
    systemextensionsctl list 2>/dev/null | grep -i tailscale | grep -q '\[activated enabled\]'
  args:
    executable: /bin/bash
  register: _tailscale_netext_check
  failed_when: false
  changed_when: false
  check_mode: false # read-only probe; run in --check so the guard below has a real rc

- name: Prompt user to enable the Tailscale Network Extension
  when: _tailscale_netext_check.rc != 0
  block:
    - name: Launch Tailscale.app so the extension registers and the toggle appears
      ansible.builtin.command:
        cmd: open -a Tailscale
      changed_when: false

    - name: Wait for user to enable Tailscale in Network Extensions
      ansible.builtin.pause:
        prompt: |

          ================================================================
          Manual step: enable Tailscale Network Extension
          ================================================================

          The Tailscale Network Extension is not currently enabled, so
          the tailnet tunnel can't activate. Enable it:

            System Settings → General → Login Items & Extensions →
            Network Extensions → toggle Tailscale ON

          (If a "Tailscale would like to add VPN configurations" dialog
          also appears, click Allow.)

          Press Enter once Tailscale is toggled ON.

# Auto-connect to the tailnet when an auth key is provided.
- name: Load Tailscale auth key from environment
  ansible.builtin.set_fact:
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"
  no_log: true

- name: Auto-connect to tailnet when auth key is provided
  when: tailscale_auth_key | length > 0
  block:
    - name: Check current Tailscale state
      ansible.builtin.command: tailscale status --json
      register: _tailscale_status
      changed_when: false
      failed_when: false
      check_mode: false # read-only probe; run in --check so the from_json guard has real JSON

    - name: Remind user that admin approval may be required
      ansible.builtin.debug:
        msg: |

          ================================================================
          About to run `tailscale up`. If your tailnet has Device Approval
          enabled, this task will HANG until the device is approved.

          Recommended: disable Device Approval entirely so this (and
          future provisioning runs) never hang:

            https://login.tailscale.com/admin/settings/device-management

          Otherwise, approve this Mac manually at:

            https://login.tailscale.com/admin/machines
          ================================================================
      when: _tailscale_status.rc != 0 or (_tailscale_status.stdout | from_json).BackendState != 'Running'

    - name: Bring Tailscale up
      ansible.builtin.command: >
        tailscale up
        --accept-dns
        --accept-routes
        --operator={{ lookup('env', 'USER') }}
        --auth-key={{ tailscale_auth_key }}
      become: true
      no_log: true
      changed_when: true
      when: _tailscale_status.rc != 0 or (_tailscale_status.stdout | from_json).BackendState != 'Running'

# Disable node-key expiry via the Tailscale REST API. The CLI has no
# equivalent command, so we POST directly. Requires TAILSCALE_API_ACCESS_TOKEN
# with the `devices` write scope. The device identifier is this node's
# stable ID from `tailscale status --json` (Self.ID, which the API accepts
# as its nodeId).
- name: Load Tailscale API access token from environment
  ansible.builtin.set_fact:
    tailscale_api_token: "{{ lookup('env', 'TAILSCALE_API_ACCESS_TOKEN') }}"
  no_log: true

- name: (Optional)Disable key expiry when API token is provided
  when:
    - tailscale_api_token | length > 0
    - tailscale_auth_key | length > 0
  block:
    - name: Read Tailscale status to get this node's stable ID
      ansible.builtin.command: tailscale status --json
      register: _tailscale_status_for_id
      changed_when: false
      check_mode: false # read-only probe; run in --check so the from_json below has real JSON

    - name: Extract this node's stable device ID
      ansible.builtin.set_fact:
        tailscale_device_id: "{{ (_tailscale_status_for_id.stdout | from_json).Self.ID }}"

    - name: Disable key expiry for this node
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/device/{{ tailscale_device_id }}/key"
        method: POST
        headers:
          Authorization: "Bearer {{ tailscale_api_token }}"
        body_format: json
        body:
          keyExpiryDisabled: true
        status_code: [200]
      no_log: true
