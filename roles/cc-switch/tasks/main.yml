---
- name: Tap farion1231/ccswitch
  community.general.homebrew_tap:
    name: farion1231/ccswitch
    state: present

# Homebrew refuses to load casks/formulae from untrusted third-party taps
# (HOMEBREW_REQUIRE_TAP_TRUST), so the install below fails on a fresh host with
# "Refusing to load ... from untrusted tap" unless the tap is trusted first.
# `brew trust --tap` is idempotent (rc=0 whether or not already trusted); keying
# changed_when off its output reports changed only on the run that adds the tap.
- name: Trust farion1231/ccswitch
  ansible.builtin.command:
    cmd: brew trust --tap farion1231/ccswitch
  register: _ccswitch_trust
  changed_when: "'Already trusted tap' not in _ccswitch_trust.stdout"

- name: Install cc-switch
  community.general.homebrew_cask:
    name: cc-switch
    state: present
