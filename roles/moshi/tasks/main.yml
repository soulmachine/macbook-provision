---
# moshi-hook — installed from the third-party tap rjyo/moshi and run as a
# Homebrew background service. References:
#   - https://github.com/rjyo/homebrew-moshi
#   - https://getmoshi.app/docs/hooks#install-on-macos
#
# Implemented as the literal brew command sequence (tap -> trust -> install ->
# services start). Each command is guarded so the role stays idempotent — bare
# brew commands otherwise re-run and re-report "changed" on every pass.

# brew tap rjyo/moshi
- name: Locate the Homebrew repository (for the tap path)
  ansible.builtin.command:
    cmd: brew --repository
  register: _brew_repo
  changed_when: false

- name: Tap rjyo/moshi
  ansible.builtin.command:
    cmd: brew tap rjyo/moshi
    creates: "{{ _brew_repo.stdout }}/Library/Taps/rjyo/homebrew-moshi"

# brew trust rjyo/moshi
# Homebrew 6.x refuses to load formulae from untrusted third-party taps
# (HOMEBREW_REQUIRE_TAP_TRUST), so this must run before install. Trusted entries
# live in trust.json; reading it keeps the trust step idempotent.
- name: Read Homebrew tap trust state
  ansible.builtin.command:
    cmd: brew trust --json v1
  register: _moshi_trust
  changed_when: false

- name: Trust rjyo/moshi
  ansible.builtin.command:
    cmd: brew trust rjyo/moshi
  when: >
    'rjyo/moshi' not in
    ((_moshi_trust.stdout | default('{}', true) | from_json).taps | default([]))

# brew install moshi-hook
- name: Check whether moshi-hook is installed
  ansible.builtin.command:
    cmd: brew list --versions moshi-hook
  register: _moshi_installed
  changed_when: false
  failed_when: false

- name: Install moshi-hook
  ansible.builtin.command:
    cmd: brew install moshi-hook
  when: _moshi_installed.rc != 0

# brew services start moshi-hook
- name: Check whether the moshi-hook service is running
  ansible.builtin.command:
    cmd: brew services info moshi-hook --json
  register: _moshi_service
  changed_when: false
  failed_when: false

- name: Start moshi-hook service
  ansible.builtin.command:
    cmd: brew services start moshi-hook
  when: >
    (_moshi_service.stdout | default('[]', true) | from_json
     | selectattr('running', 'equalto', true) | list | length) == 0
