---
- name: Install common Homebrew packages
  community.general.homebrew:
    name:
      - tmux
      - git
      - curl
      - wget
      - jq
      - ripgrep
      - fd
      - tree
      - htop
      - docker
      - ffmpeg
      - gnupg
      - multica-ai/tap/multica
    state: latest

- name: Install Homebrew cask apps
  community.general.homebrew_cask:
    name:
      - claude
      - codex
      - gemini
      - pearcleaner
      - pycharm
      - sublime-text
      - visual-studio-code
    state: present

- name: Ensure architecture fact is gathered
  ansible.builtin.setup:
    gather_subset: architecture
  when: ansible_architecture is not defined

- name: Install Apple Silicon-only Homebrew cask apps
  community.general.homebrew_cask:
    name:
      - chatgpt
    state: present
  when: ansible_architecture == "arm64"
