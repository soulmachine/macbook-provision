---
# NOTE: third-party taps (farion1231/ccswitch, multica-ai/tap, rjyo/moshi, ...)
# are tapped, trusted, and installed by their own roles (cc-switch, multica-cli,
# moshi). Don't install user/tap/formula packages here — brew auto-taps them and,
# under HOMEBREW_REQUIRE_TAP_TRUST, refuses the untrusted formula, failing this
# role before the owning role's guarded `brew trust` step ever runs.

- name: Fix fd symlink conflict if present
  ansible.builtin.command:
    cmd: brew link --overwrite fd
  changed_when: false
  failed_when: false

- name: Install common Homebrew packages
  community.general.homebrew:
    name:
      - git
      - curl
      - wget
      - jq
      - ripgrep
      - fd
      - tree
      - htop
      - docker
      - ffmpeg
      - gh
      - gnupg
    state: latest

- name: Install Homebrew cask apps
  community.general.homebrew_cask:
    name:
      - claude
      - gemini
      - pearcleaner
      - pycharm
      - sublime-text
      - visual-studio-code
    state: present

- name: Ensure architecture fact is gathered
  ansible.builtin.setup:
    gather_subset: architecture
  when: ansible_facts['architecture'] is not defined

- name: Install Apple Silicon-only Homebrew cask apps
  community.general.homebrew_cask:
    name:
      - chatgpt
    state: present
  when: ansible_facts['architecture'] == "arm64"
