---
- name: Trust farion1231/ccswitch tap if present
  ansible.builtin.shell: |
    brew tap | grep -q 'farion1231/ccswitch' && brew trust farion1231/ccswitch || true
  changed_when: false

- name: Fix fd symlink conflict if present
  ansible.builtin.command:
    cmd: brew link --overwrite fd
  changed_when: false
  failed_when: false

- name: Install common Homebrew packages
  community.general.homebrew:
    name:
      - tmux
      - git
      - curl
      - wget
      - jq
      - ripgrep
      - fd
      - tree
      - htop
      - docker
      - ffmpeg
      - gh
      - gnupg
      - multica-ai/tap/multica
    state: latest

- name: Install Homebrew cask apps
  community.general.homebrew_cask:
    name:
      - claude
      - codex
      - gemini
      - pearcleaner
      - pycharm
      - sublime-text
      - visual-studio-code
    state: present

- name: Ensure architecture fact is gathered
  ansible.builtin.setup:
    gather_subset: architecture
  when: ansible_facts['architecture'] is not defined

- name: Install Apple Silicon-only Homebrew cask apps
  community.general.homebrew_cask:
    name:
      - chatgpt
    state: present
  when: ansible_facts['architecture'] == "arm64"
